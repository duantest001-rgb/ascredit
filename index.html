<!doctype html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaoCreditAssist - Login</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand-block">
      <div class="logo">LCA</div>
      <h1>LaoCreditAssist</h1>
      <p>ຜູ້ຊ່ວຍວິເຄາະສິນເຊື່ອເບື້ອງຕົ້ນ</p>
    </div>

    <section class="panel">
      <h2>ເຂົ້າລະບົບ</h2>
      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com" />
      <label>Password</label>
      <input id="password" type="password" placeholder="••••••••" />
      <button id="loginBtn" class="primary-btn">Login</button>
      <button id="signupBtn" class="secondary-btn">Create Account</button>
      <p id="authMessage" class="message"></p>
    </section>

    <p class="hint">ກ່ອນໃຊ້: ໃຫ້ໃສ່ SUPABASE_URL ແລະ SUPABASE_ANON_KEY ໃນ <b>js/config.js</b></p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
