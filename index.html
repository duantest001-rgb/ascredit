<!doctype html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LaoCreditAssist - Login</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
  <main class="auth-card">
    <div class="brand-block">
      <div class="logo">LCA</div>
      <h1>LaoCreditAssist</h1>
      <p>ຜູ້ຊ່ວຍວິເຄາະສິນເຊື່ອເບື້ອງຕົ້ນ</p>
    </div>

    <form id="authForm" class="panel" autocomplete="on">
      <h2>ເຂົ້າລະບົບ</h2>
      <label for="email">ອີເມວ</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" />

      <label for="password">ລະຫັດຜ່ານ</label>
      <div class="password-field">
        <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" />
        <button id="togglePassword" type="button" class="password-eye" aria-label="ສະແດງລະຫັດ" title="ສະແດງ/ເຊື່ອງລະຫັດ">
          <span class="eye-icon" aria-hidden="true">
            <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3l18 18"/>
              <path d="M10.6 10.6A3 3 0 0 0 13.4 13.4"/>
              <path d="M9.9 5.1A10.4 10.4 0 0 1 12 5c6.5 0 10 7 10 7a17.5 17.5 0 0 1-3.1 4.1"/>
              <path d="M6.6 6.6C3.6 8.5 2 12 2 12s3.5 7 10 7c1.2 0 2.3-.2 3.3-.6"/>
            </svg>
          </span>
        </button>
      </div>

      <button id="loginBtn" type="submit" class="primary-btn full-btn">ເຂົ້າລະບົບ</button>
      <button id="signupBtn" type="button" class="secondary-btn full-btn">ສ້າງບັນຊີ</button>
      <p id="authMessage" class="message"></p>
      <p class="auth-help">ກົດ Enter ເພື່ອເຂົ້າລະບົບ ຫຼື ກົດປຸ່ມ “ເຂົ້າລະບົບ”.</p>
    </form>

    <p class="hint">ຖ້າເຂົ້າບໍ່ໄດ້ ໃຫ້ກວດອີເມວ, ລະຫັດຜ່ານ ຫຼື ການຢືນຢັນ email ໃນ Supabase.</p>
  </main>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
